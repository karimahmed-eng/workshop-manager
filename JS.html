<script>

let currentPage = "Dashboard";

/* ==========================
   API
========================== */

const API = {

  run(functionName, ...args) {

    return new Promise((resolve, reject) => {

      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)[functionName](...args);

    });

  },

  getPage(page) {
    return this.run("getPage", page);
  },

  getDashboard() {
    return this.run("getDashboardData");
  },

  refreshDashboard() {
    return this.run("refreshDashboardData");
  },

  searchJobs(keyword) {
    return this.run("searchJobs", keyword);
  },

  filterJobs(filters) {
    return this.run("filterJobs", filters);
  },

  getJob(jobNumber) {
    return this.run("getJob", jobNumber);
  }

};


/* ==========================
   LOAD PAGE
========================== */

async function loadPage(page) {

  try {

    const html = await API.getPage(page);

    document.getElementById("content").innerHTML = html;

    highlightMenu(page);

    updatePageTitle(page);

    currentPage = page;

    closeMobileSidebar();

  }

  catch (error) {

    console.error(error);

    document.getElementById("content").innerHTML = `

      <div style="
        padding:20px;
        background:#fff;
        border-radius:10px;
      ">

        <h3>Error loading page</h3>

        <p>${error.message}</p>

      </div>

    `;

  }

}


/* ==========================
   MENU
========================== */

function highlightMenu(page){

  document
    .querySelectorAll(".menu-btn")
    .forEach(button=>{

      button.classList.remove("active");

      if(button.dataset.page===page){

        button.classList.add("active");

      }

    });

}


/* ==========================
   TITLE
========================== */

function updatePageTitle(page){

  const title=document.getElementById("pageTitle");

  if(title){

    title.textContent=page;

  }

}


/* ==========================
   SIDEBAR
========================== */

function toggleSidebar(){

  const sidebar=document.getElementById("sidebar");

  if(!sidebar) return;

  if(window.innerWidth<=768){

    sidebar.classList.toggle("mobile-open");

    toggleOverlay();

  }else{

    sidebar.classList.toggle("collapsed");

  }

}


function closeMobileSidebar(){

  const sidebar=document.getElementById("sidebar");

  if(!sidebar) return;

  if(window.innerWidth<=768){

    sidebar.classList.remove("mobile-open");

    hideOverlay();

  }

}


/* ==========================
   OVERLAY
========================== */

function toggleOverlay(){

  const overlay=document.getElementById("overlay");

  if(!overlay) return;

  overlay.classList.toggle("show");

}


function hideOverlay(){

  const overlay=document.getElementById("overlay");

  if(!overlay) return;

  overlay.classList.remove("show");

}


/* ==========================
   RESIZE
========================== */

window.addEventListener("resize",()=>{

  const sidebar=document.getElementById("sidebar");

  if(!sidebar) return;

  if(window.innerWidth>768){

    sidebar.classList.remove("mobile-open");

    hideOverlay();

  }

});

</script>
