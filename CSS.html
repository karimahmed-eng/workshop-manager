<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}


:root {

  --sidebar-width: 260px;
  --sidebar-collapsed-width: 72px;

  --header-height: 64px;

  --primary-color: #1a73e8;

  --sidebar-bg: #202124;
  --sidebar-hover: #3c4043;

  --background: #f5f7fb;
  --surface: #ffffff;

  --text: #202124;
  --muted-text: #5f6368;

  --border: #e5e7eb;

}



/* ==========================
   BODY
========================== */

body {

  height: 100vh;
  overflow:hidden;
  background:var(--background);
  color:var(--text);

}



/* ==========================
   APP CONTAINER
========================== */


.app {

  display:flex;
  height:100vh;
  width:100%;

}



/* ==========================
   SIDEBAR
========================== */


.sidebar {

  width:var(--sidebar-width);

  height:100vh;

  background:var(--sidebar-bg);

  color:white;

  display:flex;

  flex-direction:column;

  transition:
    width .25s ease,
    left .25s ease;

  overflow:hidden;

  flex-shrink:0;

  z-index:1000;

}



.sidebar.collapsed {

  width:var(--sidebar-collapsed-width);

}



/* Sidebar header */


.sidebar-header {

  height:var(--header-height);

  display:flex;

  align-items:center;

  padding:0 18px;

  border-bottom:
    1px solid rgba(255,255,255,.1);

}



.sidebar-logo {

  display:flex;

  align-items:center;

  gap:12px;

  white-space:nowrap;

}



.logo-icon {

  font-size:28px;

}



.logo-text {

  font-size:18px;

  font-weight:bold;

}



.sidebar.collapsed .logo-text {

  display:none;

}



/* ==========================
   MENU
========================== */


.sidebar-menu {

  flex:1;

  padding:12px;

  display:flex;

  flex-direction:column;

  gap:8px;

}



.menu-btn {


  width:100%;

  height:46px;


  border:none;

  background:transparent;


  color:white;


  display:flex;

  align-items:center;

  gap:14px;


  padding:0 14px;


  border-radius:10px;


  cursor:pointer;


  transition:.2s;


  font-size:15px;


}



.menu-btn:hover {

  background:var(--sidebar-hover);

}



.menu-btn.active {

  background:var(--primary-color);

}



.menu-icon {

  font-size:24px;

}



.menu-text {

  white-space:nowrap;

}



.sidebar.collapsed .menu-btn {

  justify-content:center;

  padding:0;

}



.sidebar.collapsed .menu-text {

  display:none;

}



/* ==========================
   SIDEBAR FOOTER
========================== */


.sidebar-footer {

  padding:15px;

  border-top:
  1px solid rgba(255,255,255,.1);

  font-size:12px;

  color:#bbb;

}


.sidebar.collapsed .version {

  display:none;

}



/* ==========================
   MAIN AREA
========================== */


.main {

  flex:1;

  display:flex;

  flex-direction:column;

  min-width:0;

}



/* ==========================
   HEADER
========================== */


.header {

  height:var(--header-height);

  background:var(--surface);


  display:flex;

  align-items:center;

  justify-content:space-between;


  padding:0 24px;


  border-bottom:
  1px solid var(--border);


}



.header-left,
.header-right {

  display:flex;

  align-items:center;

  gap:16px;

}



.header h1 {

  font-size:22px;

  font-weight:600;

}



/* menu button */


.menu-toggle,
.header-icon {


  width:40px;

  height:40px;


  border:none;

  background:transparent;


  display:flex;

  align-items:center;

  justify-content:center;


  border-radius:8px;


  cursor:pointer;


}



.menu-toggle:hover,
.header-icon:hover {


  background:#f1f3f4;


}



/* ==========================
   USER PROFILE
========================== */


.user-profile {


  display:flex;

  align-items:center;

  gap:10px;


}



.user-avatar {


  width:38px;

  height:38px;


  border-radius:50%;


  background:var(--primary-color);


  color:white;


  display:flex;

  justify-content:center;

  align-items:center;


  font-weight:bold;


}



.user-info {


  display:flex;

  flex-direction:column;


}



.user-name {


  font-weight:600;


}



.user-role {


  font-size:12px;

  color:var(--muted-text);


}



/* ==========================
   CONTENT
========================== */


#content {


  flex:1;


  padding:25px;


  overflow:auto;


}



/* ==========================
   MOBILE OVERLAY
========================== */


.overlay {


  display:none;


}



/* ==========================
   MOBILE
========================== */


@media(max-width:768px) {


  .sidebar {


    position:fixed;

    top:0;

    left:-260px;


    width:260px;


  }



  .sidebar.mobile-open {


    left:0;


  }



  .overlay.show {


    display:block;


    position:fixed;


    inset:0;


    background:
    rgba(0,0,0,.45);


    z-index:999;


  }



  .user-info {


    display:none;


  }



  .header {


    padding:0 15px;


  }



  #content {


    padding:15px;


  }


}



</style>
