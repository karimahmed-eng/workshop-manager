<div class="dashboard">

  <h1>Dashboard</h1>

  <div class="cards">

    <div class="card">
      <h3 id="totalJobs">0</h3>
      <span>Total Jobs</span>
    </div>

    <div class="card">
      <h3 id="receivedJobs">0</h3>
      <span>Received</span>
    </div>

    <div class="card">
      <h3 id="processingJobs">0</h3>
      <span>Under Processing</span>
    </div>

    <div class="card">
      <h3 id="deliveredJobs">0</h3>
      <span>Delivered</span>
    </div>

    <div class="card">
      <h3 id="delayedJobs">0</h3>
      <span>Delayed</span>
    </div>

    <div class="card">
      <h3 id="notApprovedJobs">0</h3>
      <span>Not Approved</span>
    </div>

  </div>


  <h2>Recent Jobs</h2>

  <table class="jobs-table">

    <thead>

      <tr>
        <th>Job</th>
        <th>Client</th>
        <th>Vehicle</th>
        <th>Status</th>
        <th>Center</th>
      </tr>

    </thead>

    <tbody id="recentJobsTable"></tbody>

  </table>

</div>


<script>

async function loadDashboard() {

  try {

    const data = await API.getDashboard();

    const statuses = data.summary.statuses || {};


    document.getElementById("totalJobs").textContent =
      data.summary.total || 0;


    document.getElementById("receivedJobs").textContent =
      statuses["Received"] || 0;


    document.getElementById("processingJobs").textContent =
      statuses["Under Processing"] || 0;


    document.getElementById("deliveredJobs").textContent =
      statuses["Delivered"] || 0;


    document.getElementById("delayedJobs").textContent =
      statuses["Delayed"] || 0;


    document.getElementById("notApprovedJobs").textContent =
      statuses["Not Approved"] || 0;


    const table =
      document.getElementById("recentJobsTable");


    table.innerHTML = "";


    (data.recentJobs || []).forEach(job => {


      table.insertAdjacentHTML(
        "beforeend",
        `

        <tr>

          <td>${job.jobNumber || ""}</td>

          <td>${job.clientName || ""}</td>

          <td>
            ${job.manufacturer || ""}
            ${job.model || ""}
          </td>

          <td>${job.status || ""}</td>

          <td>${job.center || ""}</td>

        </tr>

        `
      );


    });


  }

  catch(error) {

    console.error(
      "Dashboard loading failed:",
      error
    );

  }

}


loadDashboard();

</script>
