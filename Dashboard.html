<div class="dashboard">

  <h1>Dashboard</h1>

  <div class="cards">

```
<div class="card">
  <h3 id="totalJobs">0</h3>
  <span>Total Jobs</span>
</div>

<div class="card">
  <h3 id="pendingJobs">0</h3>
  <span>Pending</span>
</div>

<div class="card">
  <h3 id="deliveredJobs">0</h3>
  <span>Delivered</span>
</div>

<div class="card">
  <h3 id="delayedJobs">0</h3>
  <span>Delayed</span>
</div>
```

  </div>

  <h2>Recent Jobs</h2>

  <table class="jobs-table">

```
<thead>
  <tr>
    <th>Job</th>
    <th>Client</th>
    <th>Vehicle</th>
    <th>Status</th>
  </tr>
</thead>

<tbody id="recentJobsTable"></tbody>
```

  </table>

</div>

<script>

function loadDashboard() {

  google.script.run
    .withSuccessHandler(function(data) {


      document.getElementById("totalJobs").textContent =
        data.summary.total;


      document.getElementById("pendingJobs").textContent =
        data.summary.pending;


      document.getElementById("deliveredJobs").textContent =
        data.summary.delivered;


      document.getElementById("delayedJobs").textContent =
        data.summary.delayed;



      const table =
        document.getElementById("recentJobsTable");


      table.innerHTML = "";


      data.recentJobs.forEach(job => {


        table.innerHTML += `

          <tr>

            <td>${job.Job || ""}</td>

            <td>${job["Client Name"] || ""}</td>

            <td>
              ${job.Manufacturer || ""}
              ${job["Car Model"] || ""}
            </td>

            <td>${job.Status || ""}</td>

          </tr>

        `;


      });


    })
    .getDashboardData();

}


loadDashboard();

</script>
