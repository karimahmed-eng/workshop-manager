<div class="dashboard">

  <h1>Dashboard</h1>

  <div class="cards">

    <div class="card">
      <h3 id="totalJobs">0</h3>
      <span>Total Jobs</span>
    </div>

    <div class="card">
      <h3 id="pendingJobs">0</h3>
      <span>Pending</span>
    </div>

    <div class="card">
      <h3 id="deliveredJobs">0</h3>
      <span>Delivered</span>
    </div>

    <div class="card">
      <h3 id="delayedJobs">0</h3>
      <span>Delayed</span>
    </div>

  </div>

  <h2>Recent Jobs</h2>

  <table class="jobs-table">

    <thead>

      <tr>
        <th>Job</th>
        <th>Client</th>
        <th>Vehicle</th>
        <th>Status</th>
      </tr>

    </thead>

    <tbody id="recentJobsTable"></tbody>

  </table>

</div>

<script>

async function loadDashboard() {

  try {

    const data = await API.getDashboard();

    document.getElementById("totalJobs").textContent =
      data.summary.total || 0;

    document.getElementById("deliveredJobs").textContent =
      data.summary.statuses["Delivered"] || 0;

    document.getElementById("delayedJobs").textContent =
      data.summary.statuses["Delayed"] || 0;

    const pending =
      data.summary.total -
      (data.summary.statuses["Delivered"] || 0);

    document.getElementById("pendingJobs").textContent =
      pending;

    const table =
      document.getElementById("recentJobsTable");

    table.innerHTML = "";

    data.recentJobs.forEach(job => {

      table.insertAdjacentHTML("beforeend", `

        <tr>

          <td>${job.jobNumber || ""}</td>

          <td>${job.clientName || ""}</td>

          <td>

            ${job.manufacturer || ""}
            ${job.model || ""}

          </td>

          <td>${job.status || ""}</td>

        </tr>

      `);

    });

  }

  catch (error) {

    console.error(error);

  }

}

loadDashboard();

</script>
